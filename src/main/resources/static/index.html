<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bot 控制台</title>
    <style>
        /* ===== CSS Variables (主题) ===== */
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111927;
            --bg-card: #111927;
            --bg-input: #1a2332;
            --border-color: #1e293b;
            --text-primary: #d4e0f0;
            --text-secondary: #94a3b8;
            --text-muted: #475569;
            --text-inverse: #0a0e17;
            --accent: #38bdf8;
            --accent-hover: #7dd3fc;
            --green: #4ade80;
            --red: #f87171;
            --yellow: #fbbf24;
            --shadow: 0 4px 24px rgba(0,0,0,0.4);
            --radius: 14px;
            --transition: 0.25s ease;
        }
        [data-theme="light"] {
            --bg-primary: #f1f5f9;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --bg-input: #e2e8f0;
            --border-color: #cbd5e1;
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --text-muted: #64748b;
            --text-inverse: #f8fafc;
            --shadow: 0 4px 16px rgba(0,0,0,0.08);
            --accent: #2563eb;
            --accent-hover: #3b82f6;
            --green: #16a34a;
            --red: #dc2626;
            --yellow: #ca8a04;
        }

        /* ===== Reset & Base ===== */
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            min-height: 100vh;
            padding: 20px;
            transition: background var(--transition), color var(--transition);
        }
        .container { max-width: 1400px; margin:0 auto; }

        /* ===== Header ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0 20px;
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
            gap: 12px;
        }
        .logo {
            font-size: 26px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo span {
            background: linear-gradient(135deg, var(--accent), #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-secondary);
            padding: 6px 16px 6px 12px;
            border-radius: 40px;
            border: 1px solid var(--border-color);
            font-size: 14px;
        }
        .dot {
            width: 10px; height: 10px; border-radius: 50%; display: inline-block;
        }
        .dot.green { background: var(--green); box-shadow: 0 0 8px var(--green); }
        .dot.red { background: var(--red); box-shadow: 0 0 8px var(--red); }
        .dot.yellow { background: var(--yellow); box-shadow: 0 0 8px var(--yellow); }

        /* 主题切换按钮 */
        .theme-toggle {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 40px;
            padding: 6px 12px;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 20px;
            line-height: 1;
            transition: 0.2s;
        }
        .theme-toggle:hover {
            background: var(--bg-input);
            color: var(--text-primary);
        }

        /* ===== Stats Grid ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin: 24px 0 28px;
        }
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 18px 20px;
            transition: border var(--transition), background var(--transition);
            box-shadow: var(--shadow);
        }
        .stat-card:hover { border-color: var(--accent); }
        .stat-label {
            font-size: 13px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }
        .stat-value {
            font-size: 28px;
            font-weight: 600;
            margin-top: 4px;
        }
        .stat-sub {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 2px;
        }
        /* 内存进度条 */
        .mem-bar {
            width: 100%;
            height: 6px;
            background: var(--bg-input);
            border-radius: 10px;
            margin-top: 8px;
            overflow: hidden;
        }
        .mem-bar-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 10px;
            transition: width 0.4s;
        }

        /* ===== Tabs ===== */
        .tabs {
            display: flex;
            gap: 6px;
            margin: 20px 0 24px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 2px;
        }
        .tab {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 10px 22px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 10px 10px 0 0;
            transition: 0.2s;
            position: relative;
        }
        .tab:hover { color: var(--text-primary); background: var(--bg-input); }
        .tab.active {
            color: var(--accent);
            background: var(--bg-card);
        }
        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 20%;
            width: 60%;
            height: 2px;
            background: var(--accent);
            border-radius: 4px;
        }

        /* ===== Panels ===== */
        .panel { display: none; animation: fade 0.25s ease; }
        .panel.active { display: block; }
        @keyframes fade {
            0% { opacity:0.5; transform:translateY(6px); }
            100% { opacity:1; transform:translateY(0); }
        }

        /* ===== Plugin Grid ===== */
        .plugin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 14px;
        }
        .plugin-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 16px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: border 0.2s;
            box-shadow: var(--shadow);
        }
        .plugin-card:hover { border-color: var(--accent); }
        .plugin-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .plugin-name { font-weight: 600; font-size: 15px; }
        .plugin-tag {
            font-size: 11px;
            padding: 2px 12px;
            border-radius: 30px;
            display: inline-block;
            width: fit-content;
        }
        .tag-core {
            background: var(--bg-input);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }
        .tag-enabled {
            background: #064e3b;
            color: var(--green);
        }
        .tag-disabled {
            background: #451a1a;
            color: var(--red);
        }
        [data-theme="light"] .tag-enabled {
            background: #dcfce7;
            color: #16a34a;
        }
        [data-theme="light"] .tag-disabled {
            background: #fee2e2;
            color: #dc2626;
        }

        /* Switch */
        .switch {
            position: relative;
            width: 44px;
            height: 24px;
            flex-shrink: 0;
            cursor: pointer;
        }
        .switch input { opacity:0; width:0; height:0; }
        .slider {
            position: absolute;
            inset: 0;
            background: var(--border-color);
            border-radius: 30px;
            transition: 0.25s;
        }
        .slider::before {
            content: '';
            position: absolute;
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background: var(--text-secondary);
            border-radius: 50%;
            transition: 0.25s;
        }
        .switch input:checked + .slider { background: var(--accent); }
        .switch input:checked + .slider::before {
            transform: translateX(20px);
            background: #fff;
        }
        .switch input:disabled + .slider { opacity:0.4; cursor:not-allowed; }

        /* ===== Logs ===== */
        .log-container {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 16px 18px;
            height: 480px;
            overflow-y: auto;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 13px;
            line-height: 1.7;
            box-shadow: var(--shadow);
        }
        .log-container::-webkit-scrollbar { width: 6px; }
        .log-container::-webkit-scrollbar-track { background: var(--bg-primary); }
        .log-container::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }

        .log-line {
            display: flex;
            gap: 12px;
            padding: 2px 0;
            border-bottom: 1px solid var(--border-color);
            white-space: pre-wrap;
            word-break: break-all;
        }
        .log-time {
            color: var(--text-muted);
            flex-shrink: 0;
            font-size: 12px;
            min-width: 70px;
        }
        .log-level {
            font-weight: 600;
            flex-shrink: 0;
            min-width: 50px;
            text-transform: uppercase;
            font-size: 12px;
        }
        .log-level.INFO { color: var(--accent); }
        .log-level.WARN { color: var(--yellow); }
        .log-level.ERROR { color: var(--red); }
        .log-level.DEBUG { color: #a78bfa; }
        .log-msg { color: var(--text-primary); }
        .log-empty {
            color: var(--text-muted);
            text-align: center;
            padding: 40px 0;
            font-style: italic;
        }

        /* ===== Commands ===== */
        .cmd-tag {
            background: var(--bg-input);
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 13px;
            display: inline-block;
            margin: 4px 6px 4px 0;
            border: 1px solid var(--border-color);
            font-family: monospace;
            color: var(--text-primary);
        }

        /* ===== Responsive ===== */
        @media (max-width: 600px) {
            .header { flex-direction: column; align-items: stretch; }
            .header-actions { justify-content: space-between; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .plugin-grid { grid-template-columns: 1fr; }
            .log-container { height: 320px; font-size: 12px; }
            .tab { padding: 8px 12px; font-size: 13px; }
        }
    </style>
</head>
<body>
<div class="container">

    <!-- Header -->
    <div class="header">
        <div class="logo">⚡ <span>Bot 控制台</span></div>
        <div class="header-actions">
            <div class="status-badge">
                <span class="dot green" id="statusDot"></span>
                <span id="statusText">连接中</span>
                <span style="color:var(--text-muted);margin:0 4px;">|</span>
                <span id="uptimeText">--</span>
            </div>
            <button class="theme-toggle" id="themeToggle" aria-label="切换主题">🌓</button>
        </div>
    </div>

    <!-- Stats -->
    <div class="stats-grid" id="statsGrid">
        <div class="stat-card">
            <div class="stat-label">📨 消息处理</div>
            <div class="stat-value" id="msgCount">0</div>
            <div class="stat-sub">本次会话</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">🧩 插件</div>
            <div class="stat-value" id="pluginCount">0</div>
            <div class="stat-sub">已加载</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">⌨️ 命令</div>
            <div class="stat-value" id="cmdCount">0</div>
            <div class="stat-sub">已注册</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">⏱️ 运行时长</div>
            <div class="stat-value" id="uptimeValue">--</div>
            <div class="stat-sub">持续运行</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">💾 内存使用</div>
            <div class="stat-value" id="memValue">0 MB</div>
            <div class="mem-bar"><div class="mem-bar-fill" id="memBar" style="width:0%"></div></div>
            <div class="stat-sub" id="memSub">0 / 0 MB</div>
        </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
        <button class="tab active" data-tab="overview">📊 概览</button>
        <button class="tab" data-tab="plugins">🧩 插件</button>
        <button class="tab" data-tab="logs">📡 实时日志</button>
    </div>

    <!-- Panel: Overview -->
    <div class="panel active" id="panel-overview">
        <div style="background:var(--bg-card);border:1px solid var(--border-color);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);">
            <h3 style="font-weight:500;margin-bottom:16px;">📋 系统信息</h3>
            <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;font-size:14px;color:var(--text-secondary);">
                <div>Bot 状态: <span id="ovBotStatus" style="color:var(--green);">在线</span></div>
                <div>WebSocket URL: <span id="ovWsUrl" style="color:var(--text-primary);">--</span></div>
                <div>已加载插件: <span id="ovPluginCount" style="color:var(--text-primary);">0</span></div>
                <div>已注册命令: <span id="ovCmdCount" style="color:var(--text-primary);">0</span></div>
                <div>JVM 最大内存: <span id="ovMaxMem" style="color:var(--text-primary);">--</span></div>
                <div>已用内存: <span id="ovUsedMem" style="color:var(--text-primary);">--</span></div>
            </div>
        </div>
    </div>

    <!-- Panel: Plugins -->
    <div class="panel" id="panel-plugins">
        <div class="plugin-grid" id="pluginGrid"></div>
    </div>

    <!-- Panel: Logs -->
    <div class="panel" id="panel-logs">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
            <span style="font-size:14px;color:var(--text-secondary);">🟢 日志实时流</span>
            <span style="font-size:12px;color:var(--text-muted);" id="logStatus">连接中...</span>
        </div>
        <div class="log-container" id="logContainer">
            <div class="log-empty">⏳ 等待日志输出...</div>
        </div>
    </div>

</div>

<script>
    (function() {
        'use strict';

        // ===== DOM 引用 =====
        const $ = id => document.getElementById(id);

        // ===== 主题切换 =====
        const themeToggle = $('themeToggle');
        const currentTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', currentTheme);
        themeToggle.textContent = currentTheme === 'dark' ? '🌙' : '☀️';

        themeToggle.addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            themeToggle.textContent = next === 'dark' ? '🌙' : '☀️';
        });

        // ===== 状态变量 =====
        let msgCounter = 0;
        let startTime = Date.now();
        let wsLog = null;
        let statusInterval = null;
        let pluginInterval = null;

        // ===== 工具函数 =====
        function fmtTime(ms) {
            const s = Math.floor(ms / 1000);
            const m = Math.floor(s / 60);
            const h = Math.floor(m / 60);
            const d = Math.floor(h / 24);
            if (d > 0) return `${d}d ${h%24}h`;
            if (h > 0) return `${h}h ${m%60}m`;
            if (m > 0) return `${m}m ${s%60}s`;
            return `${s}s`;
        }

        // ===== Tab 切换 =====
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                tab.classList.add('active');
                const target = tab.dataset.tab;
                document.getElementById('panel-' + target).classList.add('active');
                if (target === 'logs' && !wsLog) {
                    initLogWebSocket();
                }
            });
        });

        // ===== 加载状态 =====
        async function loadStatus() {
            try {
                const res = await fetch('/api/status');
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const data = await res.json();

                // 状态灯
                const dot = $('statusDot');
                const text = $('statusText');
                if (data.wsConnected) {
                    dot.className = 'dot green';
                    text.textContent = '在线';
                } else {
                    dot.className = 'dot red';
                    text.textContent = '离线';
                }

                // 运行时间
                const uptimeSec = data.uptime || 0;
                const uptimeDisplay = fmtTime(uptimeSec * 1000);
                $('uptimeText').textContent = '运行 ' + uptimeDisplay;
                $('uptimeValue').textContent = uptimeDisplay;

                // 消息计数 (由后端提供，或前端累计)
                if (data.messageCount !== undefined) msgCounter = data.messageCount;
                $('msgCount').textContent = msgCounter;

                // 插件 & 命令
                const pluginCount = data.loadedPlugins || 0;
                const cmdCount = data.registeredCommands || 0;
                $('pluginCount').textContent = pluginCount;
                $('cmdCount').textContent = cmdCount;

                // 内存
                const usedMB = data.usedMemoryMB || 0;
                const maxMB = data.maxMemoryMB || 1024;
                $('memValue').textContent = usedMB + ' MB';
                const percent = Math.min(100, (usedMB / maxMB) * 100);
                $('memBar').style.width = percent + '%';
                $('memSub').textContent = usedMB + ' / ' + maxMB + ' MB';

                // 概览面板
                $('ovBotStatus').textContent = data.wsConnected ? '✅ 在线' : '❌ 离线';
                $('ovWsUrl').textContent = data.wsUrl || '未配置';
                $('ovPluginCount').textContent = pluginCount;
                $('ovCmdCount').textContent = cmdCount;
                $('ovMaxMem').textContent = maxMB + ' MB';
                $('ovUsedMem').textContent = usedMB + ' MB';

            } catch (e) {
                console.warn('状态加载失败', e);
            }
        }

        // ===== 加载插件列表 =====
        async function loadPlugins() {
            try {
                const res = await fetch('/api/plugins');
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const data = await res.json();
                const grid = $('pluginGrid');
                if (!data.plugins || data.plugins.length === 0) {
                    grid.innerHTML = '<div style="color:var(--text-muted);padding:20px;text-align:center;">暂无插件</div>';
                    return;
                }
                grid.innerHTML = data.plugins.map(p => {
                    const tag = p.core
                        ? '<span class="plugin-tag tag-core">核心</span>'
                        : (p.enabled ? '<span class="plugin-tag tag-enabled">启用</span>' : '<span class="plugin-tag tag-disabled">禁用</span>');
                    const checked = p.enabled ? 'checked' : '';
                    const disabled = p.core ? 'disabled' : '';
                    return `
                        <div class="plugin-card">
                            <div class="plugin-info">
                                <span class="plugin-name">${p.name}</span>
                                <div>${tag}</div>
                            </div>
                            <label class="switch">
                                <input type="checkbox" ${checked} ${disabled} data-name="${p.name}" data-core="${p.core}" />
                                <span class="slider"></span>
                            </label>
                        </div>
                    `;
                }).join('');

                // 绑定切换事件
                document.querySelectorAll('.switch input[type="checkbox"]').forEach(el => {
                    el.addEventListener('change', async (e) => {
                        const name = el.dataset.name;
                        const enable = el.checked;
                        try {
                            const resp = await fetch(`/api/toggle?name=${encodeURIComponent(name)}&enable=${enable}`, { method: 'POST' });
                            const result = await resp.json();
                            if (!result.success) {
                                alert('操作失败: ' + (result.error || '未知错误'));
                                el.checked = !enable;
                            } else {
                                // 刷新状态和插件列表
                                loadStatus();
                                loadPlugins();
                            }
                        } catch (err) {
                            alert('请求失败: ' + err.message);
                            el.checked = !enable;
                        }
                    });
                });
            } catch (e) {
                console.warn('插件加载失败', e);
            }
        }

        // ===== 日志 WebSocket =====
        function initLogWebSocket() {
            const port = window.location.port || '8079';
            const wsPort = parseInt(port) - 1; // 默认 8078
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const url = `${protocol}//${window.location.hostname}:${wsPort}`;
            $('logStatus').textContent = '连接中...';

            wsLog = new WebSocket(url);
            wsLog.onopen = () => {
                $('logStatus').textContent = '✅ 已连接';
                const container = $('logContainer');
                // 清空占位（如果有）
                if (container.children.length === 1 && container.children[0].classList.contains('log-empty')) {
                    container.innerHTML = '';
                }
            };
            wsLog.onmessage = (ev) => {
                try {
                    const data = JSON.parse(ev.data);
                    const time = new Date(data.time).toLocaleTimeString();
                    const level = data.level || 'INFO';
                    const msg = data.msg || '';
                    const line = document.createElement('div');
                    line.className = 'log-line';
                    line.innerHTML = `
                        <span class="log-time">${time}</span>
                        <span class="log-level ${level}">${level}</span>
                        <span class="log-msg">${msg}</span>
                    `;
                    const container = $('logContainer');
                    container.appendChild(line);
                    container.scrollTop = container.scrollHeight;

                    // 简单统计消息数（可根据需要调整关键词）
                    if (msg.includes('消息') || msg.includes('command') || msg.includes('群')) {
                        msgCounter++;
                    }
                } catch (e) {
                    // 非JSON数据直接显示
                    const container = $('logContainer');
                    const div = document.createElement('div');
                    div.className = 'log-line';
                    div.innerHTML = `<span class="log-msg">${ev.data}</span>`;
                    container.appendChild(div);
                    container.scrollTop = container.scrollHeight;
                }
            };
            wsLog.onclose = () => {
                $('logStatus').textContent = '❌ 断开，5秒后重连...';
                wsLog = null;
                setTimeout(initLogWebSocket, 5000);
            };
            wsLog.onerror = () => {
                $('logStatus').textContent = '⚠️ 连接错误';
            };
        }

        // ===== 定时刷新 =====
        function startPolling() {
            if (statusInterval) clearInterval(statusInterval);
            statusInterval = setInterval(loadStatus, 3000);
            // 插件列表刷新频率可慢一些（10秒）
            if (pluginInterval) clearInterval(pluginInterval);
            pluginInterval = setInterval(loadPlugins, 10000);
        }

        // ===== 初始化 =====
        loadStatus();
        loadPlugins();
        startPolling();

        // 如果默认选中日志面板，初始化 WebSocket
        const activeTab = document.querySelector('.tab.active');
        if (activeTab && activeTab.dataset.tab === 'logs') {
            initLogWebSocket();
        }

        // 窗口关闭前清理定时器
        window.addEventListener('beforeunload', () => {
            if (statusInterval) clearInterval(statusInterval);
            if (pluginInterval) clearInterval(pluginInterval);
            if (wsLog && wsLog.readyState === WebSocket.OPEN) wsLog.close();
        });

        console.log('🚀 Bot 仪表盘已加载');
    })();
</script>
</body>
</html>
